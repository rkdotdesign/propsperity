name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # pull-requests: write lets Changesets open the Version PR

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESETS_TOKEN }}
          # Use the Changesets token so it can push commits
          # and open PRs on your behalf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm publish
          version: npx changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # This is the magic step — it does ONE of two things:
        # IF there are pending changeset files:
        #   → Opens/updates a "Version PR" automatically
        # IF the Version PR was just merged:
        #   → Runs npm publish
        #   → Updates CHANGELOG.md
        #   → Bumps version in package.json

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: storybook-static